# ======================================================================
# Daily Watch - 모니터링 대상 오픈소스 라이브러리 목록
# ======================================================================
# 작성일: 2026-04-21
# 관리자: <담당자 이메일>
#
# [작성 규칙]
# - name:            사람이 읽는 이름 (보고서에 표시됨)
# - ecosystem:       OSV.dev 기준 ecosystem 값 (대소문자 구분)
#                    Maven / PyPI / npm / Go / Debian / OSS-Fuzz 등
# - package:         ecosystem 내 패키지 식별자
# - github:          "owner/repo" 형식 (GitHub 저장소가 있는 경우만)
# - current_version: 자사가 현재 사용 중인 버전 (영향도 판별 기준)
# - category:        분류 (Web/WAS, DBMS, OS)
# - priority:        high / medium / low (긴급도 판단 가중치)
# - note:            특이사항, 확인 필요 메모
#
# [운영 팁]
# - 첫 1~2주는 Web/WAS 먼저 안정화 후 DBMS, OS 순서로 확장 권장
# - OS 라이브러리 중 GitHub 저장소가 없는 것은 OSV.dev만 활용
# - current_version 확인 필요 표시는 실제 운영팀에 확인 후 업데이트
# ======================================================================

